name: CI-CD Pipeline

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    build-test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v5

            - name: Use Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: '24'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Security audit
              run: npm audit --audit-level=high

            - name: Type check
              run: npx tsc --noEmit

            - name: Build API
              run: npm run build -w api
            
            - name: Build Client
              run: npm run build -w client

            - name: Run Tests
              run: npm run test -ws

    docker:
        needs: build-test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Docker Login
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Docker Build and Push API
              uses: docker/build-push-action@v6
              with:
                  context: ./packages/api
                  push: true
                  tags: ${{ secrets.DOCKER_USERNAME }}/microsass-api:latest

            - name: Docker Build and Push Client
              uses: docker/build-push-action@v6
              with:
                  context: ./packages/client
                  push: true
                  tags: ${{ secrets.DOCKER_USERNAME }}/microsass-client:latest

    deploy:
        needs: docker
        runs-on: ubuntu-latest

        steps:
            - name: Deploy API
              run: |
                  curl -X POST ${{ secrets.DEPLOY_API_URL }}