name: CI Pipeline

on:
    push:
        branches: [develop]
    pull_request:
        branches: [develop]

jobs:
    build-test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v5

            - name: Use Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: '24'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            # - name: Security audit
            #   run: npm audit --audit-level=high

            - name: Generate Prisma Client
              run: |
                  cd api/
                  npm run prisma:generate
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}

            - name: Type check API
              run: |
                  cd api/
                  npm run type-check

            - name: Type check Client
              run: |
                  cd client/
                  npm run type-check

            - name: Build API
              run: npm run build -w api

            - name: Build Client
              run: npm run build -w client

            - name: Run API Tests
              run: npm run test -w api
            
            - name: Run Client Tests
              run: npm run test -w client     

    docker:
        needs: build-test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build API image
              run: docker build -t chp-notes-api-dev:latest -f api/Dockerfile .         

            - name: Build Client image
              run: docker build -t chp-notes-client-dev:latest -f client/Dockerfile .         
