name: CI Pipeline

on:
    push:
        branches: [develop]
    pull_request:
        branches: [develop]

jobs:
    build-test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v5

            - name: Use Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: '24'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            # - name: Security audit
            #   run: npm audit --audit-level=high

            - name: Generate Prisma Client
              run: |
                  cd api/
                  npm run prisma:generate
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}

            - name: Type check API
              run: |
                  cd api/
                  npm run type-check

            - name: Type check Client
              run: |
                  cd client/
                  npm run type-check

            - name: Build API
              run: npm run build -w api

            - name: Build Client
              run: npm run build -w client

            - name: Run Tests
              run: npm run test -ws

    docker:
        needs: build-test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build API image
              uses: docker/build-push-action@v6
              with:
                  context: ./api
                  push: true
                  tags: ${{ secrets.DOCKERHUB_USERNAME }}/chp-notes-api-dev:latest

            - name: Build Client image
              uses: docker/build-push-action@v6
              with:
                  context: ./client
                  push: true
                  tags: ${{ secrets.DOCKERHUB_USERNAME }}/chp-notes-client-dev:latest
                  build-args: |
                      VITE_API_URL=${{ secrets.VITE_API_URL }}
