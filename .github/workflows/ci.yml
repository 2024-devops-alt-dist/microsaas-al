name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  
  client:
    name: "Frontend CI"
    runs-on: ubuntu-latest
    
    defaults:
     run:
      working-directory: ./client
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: List files in client
        run: ls -l
      
      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Run linter
        run: npm run lint
      
      - name: Type check
        run: npx tsc --noEmit

      - name: Build application
        run: |
          tsc -b
          vite build
        env:
          VITE_API_URL: production

      - name: Install hadolint
        run: |
          wget -O /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint client Dockerfile
        run: hadolint Dockerfile
      
  api:
    name: "Backend CI"
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./api
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install hadolint
        run: |
          wget -O /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint
      
      - name: Install dependencies
        run: npm ci
      
      - name: Security audit
        run: npm audit --audit-level=high
      
      - name: Run linter
        run: npm run lint
      
      - name: Type check
        run: tsc --noEmit

      - name: Build application
        run: echo "No build step needed"

      - name: Lint api Dockerfile
        run: hadolint Dockerfile
    
  gitguardian-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install ggshield
        run: pip install ggshield

      - name: Scan for secrets
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: ggshield scan repo .