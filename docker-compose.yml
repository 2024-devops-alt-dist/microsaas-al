services:
  db:
    image: postgres:latest
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d/
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    networks:
      - backend_network

  api:
    build: ./api
    ports:
      - "${API_PORT}:3000"
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      API_PORT: ${API_PORT}
    networks:
      - backend_network
      - frontend_network
    depends_on:
      - db

  client:
    build: ./client
    ports:
      - "${CLIENT_PORT}:80"
    networks:
      - frontend_network
    depends_on:
      - api

volumes:
  db-data:

networks:
  backend_network:
    driver: bridge
  frontend_network:
    driver: bridge