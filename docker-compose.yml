services:
    db:
        image: postgres:latest
        volumes:
            - db-data:/var/lib/postgresql
        ports:
            - '${DB_PORT}:5432'
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        networks:
            - backend_network

    api:
        build: ./api
        ports:
            - '${API_PORT}:3000'
        environment:
            API_PORT: ${API_PORT}
            DATABASE_URL: ${DATABASE_URL}
            FRONT_URL: ${FRONT_URL}
        networks:
            - backend_network
            - frontend_network
        depends_on:
            - db

    client:
        build: ./client
        ports:
            - '${CLIENT_PORT}:80'
        networks:
            - frontend_network
        depends_on:
            - api

volumes:
    db-data:

networks:
    backend_network:
        driver: bridge
    frontend_network:
        driver: bridge
